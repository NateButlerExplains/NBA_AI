services:
  - type: web
    name: nba-ai
    runtime: docker
    plan: free
    buildCommand: ""
    startCommand: "python start_app.py"
    healthCheckPath: /
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_PATH
        value: "/var/data/NBA_AI_dev.sqlite"
      - key: PROJECT_ROOT
        value: "/app"
    disk:
      - path: /var/data
        sizeGB: 2
