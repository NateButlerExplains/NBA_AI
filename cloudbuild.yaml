steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nba-ai:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nba-ai:$SHORT_SHA'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nba-ai:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/nba-ai:latest'
      - '--location=us-central1'
      - '--output=ignored'

images:
  - 'gcr.io/$PROJECT_ID/nba-ai:latest'
  - 'gcr.io/$PROJECT_ID/nba-ai:$SHORT_SHA'

options:
  machineType: 'N1_HIGHCPU_8'
