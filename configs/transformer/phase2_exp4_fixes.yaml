# =============================================================================
# EXPERIMENT 4 (Phase 2): Fix Spread Prediction Collapse
# Date: Feb 25, 2026
# =============================================================================
# Four targeted fixes for the spread prediction collapse (mean |spread| 3.68
# vs actual 12.45):
#
#   1. Loss Fix: MSE weight 0.1 -> 1.0, cap spread sigma at 8.0
#      - Gaussian NLL with learned sigma inflated sigma to ~10.7, reducing
#        gradient on mu by ~70x vs pure MSE. Model equilibrium: predict ~0.
#      - MSE provides direct gradient on mu regardless of sigma.
#      - Capping sigma prevents the NLL sigma inflation trap.
#
#   2. Gated Dynamics Merge: replace concat-with-zeros
#      - Old: ALL games go through Linear(1024, 512) with 512 zeros for 94%
#      - New: context passes through unchanged; recent games add gated dynamics
#
#   3. Simpler Rest Embedding: remove wasteful 64->512 projection
#      - Rest days are a single integer. 64-d embedding is sufficient.
#      - Old: Embedding(30, 64) -> Linear(64, 512) -> LN -> team_combine(3*512)
#      - New: Embedding(30, 64) -> team_combine(512+512+64)
#
#   4. Reduced Fusion Dropout: 0.3 -> 0.1
#      - Fusion layer showed 80% variance in PC1 (near-collapsed).
#      - Lower dropout preserves more discriminative information.
#
# Carries forward all Exp 3 features (player form, team-relative scores,
# 8 temporal pool queries).
#
# Baseline reference: Spread MAE 11.70, Win AUC 0.674 (Exp 1)
# Exp 3 reference:    Spread MAE 11.67, Win AUC 0.682
#
# Result: Spread MAE 11.69, RMSE 14.95, Home MAE 9.77, Away MAE 9.64,
#   Win Acc 61.9%, Win AUC 0.673, Brier 0.2312, ECE 0.0430,
#   90% Coverage 64.4%, best epoch 8, early stopped epoch 23, 39.1M params
#
# Notes: REGRESSED vs Exp 3. Spread MAE 11.69 vs 11.67, Win AUC 0.673 vs
#   0.682, Win Acc 61.9% vs ~63%. Sigma cap crushed 90% coverage from ~78%
#   to 64.4% — model cannot express appropriate uncertainty. The spread
#   collapse diagnosis was valid but these fixes overcorrected. ~6.5 min/epoch.
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/phase2_cache"
  n_recent_games: 5
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 15
  max_roster_size: 15
  batch_size: 4
  num_workers: 2
  pin_memory: true
  enable_augmentation: true

model:
  hidden_dim: 512
  player_embed_dim: 128
  n_players: 4000
  n_teams: 30
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2
  gs_embed_dim: 16
  gs_encoder_layers: 4
  gs_encoder_heads: 8
  gs_encoder_ff_dim: 2048
  gs_encoder_dropout: 0.1
  gs_max_seq_len: 1000
  temporal_layers: 3
  temporal_heads: 8
  temporal_ff_dim: 2048
  temporal_dropout: 0.1
  temporal_max_days: 180
  temporal_n_pool_queries: 8     # From Exp 3
  temporal_pos_encoding: "days_before"
  roster_layers: 2
  roster_heads: 8
  roster_ff_dim: 2048
  roster_dropout: 0.2
  rest_embed_dim: 64
  max_rest_days: 30
  fusion_dropout: 0.1            # Fix 4: was 0.3
  prediction_hidden_dim: 256
  prediction_dropout: 0.3
  spread_min_std: 1.0
  spread_max_std: 8.0            # Fix 1: cap sigma inflation
  score_min_std: 5.0

  # Player form encoder (from Exp 3)
  enable_player_form: true
  player_form_dim: 64
  player_form_days_dim: 32
  player_form_heads: 4
  player_form_ff_dim: 256
  player_form_dropout: 0.2
  max_player_appearances: 40

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0001
  weight_decay: 0.1
  betas:
    - 0.9
    - 0.98
  eps: 0.00000001
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0

training:
  max_epochs: 100
  patience: 15
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001
  ema_decay: 0.999
  use_ema: true
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  consistency_loss_weight: 0.1
  nll_weight: 1.0
  mse_weight: 1.0               # Fix 1: was 0.1 — direct gradient on mu
  gradient_accumulation_steps: 8
  checkpoint_dir: "checkpoints/phase2"
  save_every_n_epochs: 5
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  use_wandb: false
  wandb_project: "nba-phase2"
  experiment_name: "phase2_exp4_fixes"
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
