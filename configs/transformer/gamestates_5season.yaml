# =============================================================================
# GAMESTATES 5-SEASON CONFIG: Score trajectory model (no PBP)
# =============================================================================
# Full 5-season training with GameStates data.
# Compare against PBP baseline v1 (Spread MAE 12.20, 5 seasons) and
# PBP shot_features_5season (Spread MAE 12.29, 5 seasons).
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "gamestates_5season"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.1
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
