# =============================================================================
# EXPERIMENT 9: Schedule — 2 Seasons (Phase 1c)
# Date: Feb 19, 2026
# =============================================================================
# PBP + temporal embeddings. Adds days_before_target (Embed(180, 256)) and
# season_game_number (Embed(110, 256)) per history game, added as residual
# to game embeddings before TemporalAttention. +74K params (1.3% increase).
#
# Result: Spread MAE 12.41, Avg Score MAE 10.14, Win Acc 51.9%, Win AUC 0.512,
#   val_loss 39.19, best epoch 9, early stopped epoch 29, ~5.93M params
#
# Notes: Schedule features didn't help on 2-season config. Essentially
#   identical to PBP 2-season baseline (Exp 5: 12.35). The temporal
#   embeddings may not have enough data to learn meaningful patterns with
#   only 2 training seasons.
# =============================================================================

data:
  train_seasons:
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  n_schedule_features: 2
  dropout: 0.3


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "schedule_2season"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.1
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
