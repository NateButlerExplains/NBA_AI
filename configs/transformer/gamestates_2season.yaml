# =============================================================================
# EXPERIMENT 7: GameStates — 2 Seasons (Phase 1a ablation)
# Date: Feb 18, 2026
# =============================================================================
# Score trajectory only — no PBP, no players, no action types.
# Features: 5 per row (period, clock_bucket, home_score_bucket,
#   away_score_bucket, margin_bucket). Embedding: 5x16-d = 80-d -> 256-d.
# Uses separate train script: scripts/train_gamestates.py
#
# Result: Spread MAE 12.36, Avg Score MAE 10.06, Win Acc 52.0%, Win AUC 0.496,
#   val_loss 39.00, ran all 50 epochs (no overfitting), ~5.59M params
#
# Notes: Nearly identical Spread MAE to PBP 2-season (Exp 5: 12.35). Val loss
#   converged slowly but never diverged. Win AUC below 0.5 (essentially
#   random). Best Avg Score MAE across all experiments (10.06) — learned
#   score distributions well but couldn't extract directional signal.
#   KEY FINDING: PBP adds no signal beyond score trajectories.
# =============================================================================

data:
  train_seasons:
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"  # Not used by GameStates but needed by config
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "gamestates_2season"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.1
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
