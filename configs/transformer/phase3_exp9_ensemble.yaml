# =============================================================================
# EXPERIMENT 9 (Phase 3): Deep Ensemble — 3 Seeds
# Date: March 2026
# =============================================================================
# PURPOSE: Train 3 copies of Exp 4 (best balanced model) with different random
# seeds, then average predictions. Deep ensembles reduce variance without
# increasing bias and are the gold standard for uncertainty estimation.
#
# APPROACH:
#   1. Train seed 42 (already done — reuse Exp 4 checkpoint)
#   2. Train seed 137 and seed 256 with identical config
#   3. Ensemble: average spread/score means, mixture-of-Gaussians sigma,
#      logit-average win probabilities
#
# BASELINE: Exp 4 (seed 42) — MAE 10.83, AUC 0.705, Win Acc 65.1%, ECE 0.0142
#
# EXPECTED: 2-5% relative MAE improvement → MAE ~10.3-10.6
#           Better calibration (ECE) and coverage from mixture sigma
#
# RESULT: NEW BEST — ensemble improves all key metrics
#   Test set:
#   Spread MAE: 10.66 (was 10.83 single model — 1.6% improvement)
#   Spread RMSE: 14.29 (was 14.56)
#   Win AUC: 0.718 (was 0.705 — broke the 0.706 ceiling)
#   Win Accuracy: 66.5% (was 65.1%)
#   90% Coverage: 0.836 (improved from 0.821, mixture sigma captures disagreement)
#   ECE: 0.0378 (regressed from 0.0153 — logit averaging overconfident)
#
#   Val set: MAE 10.58, AUC 0.713, Acc 65.3%, ECE 0.0198
#   Individual seeds: MAE 10.82/10.96/10.71, AUC 0.706/0.684/0.703
# =============================================================================

# Reuses Exp 4 config exactly — only seed and experiment_name change
base_config: "configs/transformer/phase3_exp4_interaction.yaml"

# Seeds to train (seed 42 already exists as Exp 4)
seeds: [42, 137, 256]

# Checkpoint paths (populated after training)
checkpoints:
  seed_42: "checkpoints/phase3/phase3_exp4_interaction/best.pt"
  seed_137: "checkpoints/phase3/phase3_exp9_seed137/best.pt"
  seed_256: "checkpoints/phase3/phase3_exp9_seed256/best.pt"

# Ensemble evaluation output
output_dir: "checkpoints/phase3/phase3_exp9_ensemble"

training:
  experiment_name: "phase3_exp9_ensemble"
  seed: 42  # overridden per run
