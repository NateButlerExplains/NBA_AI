# =============================================================================
# EXPERIMENT 1: Full Baseline (Phase 1a)
# Date: Feb 14, 2026
# =============================================================================
# Tokens: 8 components (actionType, subType, period, clock, team_indicator,
#   score_diff, player, shot_result)
# Training: 5 seasons (2018-2023), dropout=0.1, weight_decay=0.01,
#   LR=1e-4, grad_accum=8
#
# Result: Spread MAE 12.20, val_loss 38.50, best epoch 5, ~5.7M params
#
# Notes: Overfitting began early (epoch 5). Train loss kept dropping while
#   val loss diverged. Indicated need for stronger regularization.
# =============================================================================

# -----------------------------------------------------------------------------
# DATA CONFIGURATION
# -----------------------------------------------------------------------------
# Controls WHAT data is loaded and HOW sequences are constructed.
data:
  # --- Temporal Train/Val/Test Split ---
  # We split by SEASON (not randomly) to prevent data leakage.
  # The model trains on older seasons and is tested on newer ones,
  # simulating real-world usage where you predict future games.
  train_seasons:
    - "2018-2019"   # ~1,230 games
    - "2019-2020"   # ~1,059 games (COVID-shortened)
    - "2020-2021"   # ~1,080 games (COVID bubble)
    - "2021-2022"   # ~1,230 games
    - "2022-2023"   # ~1,230 games
    # Total: ~5,800 training games (5 seasons)

  val_seasons:
    - "2023-2024"   # ~1,230 games for hyperparameter tuning

  test_seasons:
    - "2024-2025"   # Final evaluation (never seen during training)
    - "2025-2026"   # Current season (if data available)

  # --- Sequence Construction ---
  # How many recent games to feed the model for context
  n_history_games: 5       # Look at last 5 games per team
  min_history_games: 3     # Skip early-season games with < 3 games history

  # --- Tokenizer ---
  # Path to the vocabulary file (maps play text -> integer IDs)
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5       # Tokens seen fewer than this become <UNK>

  # --- DataLoader Settings ---
  batch_size: 4            # Games per GPU batch (small due to long sequences)
  num_workers: 2           # Parallel data loading threads
  cache_size: 2000         # LRU cache size (~35% of dataset, ~256 MB RAM)
  pin_memory: true         # Pin CPU memory for faster GPU transfer


# -----------------------------------------------------------------------------
# MODEL ARCHITECTURE
# -----------------------------------------------------------------------------
# Controls the SIZE and STRUCTURE of the neural network.
# Larger values = more capacity but slower training and more memory.
model:
  # --- Core Dimensions ---
  hidden_dim: 256          # Width of transformer layers (all internal representations)

  # --- Sequence Limits ---
  max_pbp_length: 1000     # Maximum plays per game (longer games are truncated)
  max_history_games: 10    # Maximum historical games per team

  # --- Event Encoder (processes play-by-play within each game) ---
  # This is a standard Transformer Encoder that lets each play attend to
  # every other play in the game, learning patterns like "after a timeout,
  # the team that called it usually scores."
  event_encoder_layers: 4  # Depth: 4 transformer blocks stacked
  event_encoder_heads: 8   # Width: 8 parallel attention patterns per layer
  # event_encoder_ff_dim: null  # Feed-forward dim (default: 4 * hidden_dim = 1024)

  # --- Temporal Attention (attends across multiple games) ---
  # After encoding individual games, this module attends across the
  # sequence of recent games to capture momentum/trends.
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"  # "learned" or "sinusoidal"
  temporal_pooling: "attention"            # "attention", "mean", or "first"

  # --- Regularization ---
  dropout: 0.1


# -----------------------------------------------------------------------------
# OPTIMIZER CONFIGURATION
# -----------------------------------------------------------------------------
# Controls HOW the model learns: update step sizes and regularization.
optimizer:
  # --- Optimizer Selection ---
  optimizer: "adamw"       # AdamW: Adam with decoupled weight decay (standard for transformers)

  # --- Learning Rate ---
  # How big each weight update is. Too high = unstable, too low = slow.
  # 1e-4 (0.0001) is a standard starting point for transformers.
  learning_rate: 0.0001

  # --- Weight Decay (L2 Regularization) ---
  # Penalizes large weights to prevent overfitting. 0.01 is typical.
  weight_decay: 0.01

  # --- Learning Rate Schedule ---
  # Warmup: ramp LR from 10% to 100% over the first 10% of training steps.
  # This prevents destructive updates early when weights are random.
  # Using a ratio (instead of fixed steps) so it scales with dataset size.
  scheduler: "cosine"      # "cosine" (smooth decay), "linear", or "constant"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1        # Floor LR = learning_rate * 0.1 (LR never drops below 1e-5)

  # --- Gradient Clipping ---
  # Caps gradient magnitude to prevent exploding gradients.
  max_grad_norm: 1.0


# -----------------------------------------------------------------------------
# TRAINING LOOP CONFIGURATION
# -----------------------------------------------------------------------------
# Controls the training process: epochs, checkpoints, early stopping.
training:
  # --- Epochs ---
  max_epochs: 50           # Maximum training epochs (likely stops earlier via early stopping)

  # --- Early Stopping ---
  # Stop training if validation loss doesn't improve for N epochs.
  # Prevents overfitting by stopping when the model starts memorizing.
  patience: 15
  min_delta: 0.0001        # Minimum improvement to count as "better"

  # --- Checkpointing ---
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "full_baseline"    # Subfolder: checkpoints/transformer/full_baseline/
  save_every_n_epochs: 5              # Save periodic snapshots
  keep_n_checkpoints: 3               # How many periodic checkpoints to keep

  # --- Logging ---
  log_every_n_steps: 200              # Print loss every N optimizer steps

  # --- Loss Weights ---
  # Relative importance of each prediction task in the combined loss.
  # Spread prediction is the primary goal, so it gets the highest weight.
  spread_loss_weight: 1.0             # Primary: point spread
  score_loss_weight: 0.5              # Secondary: individual team scores
  win_prob_loss_weight: 0.1           # Auxiliary: win probability

  # --- Gradient Accumulation ---
  # Simulates larger batch sizes by accumulating gradients across mini-batches.
  # Effective batch size = batch_size * gradient_accumulation_steps = 4 * 8 = 32
  gradient_accumulation_steps: 8

  # --- Reproducibility ---
  seed: 42                 # Random seed for reproducible experiments

  # --- Mixed Precision Training (AMP) ---
  # Uses float16 for most operations (faster, less memory) while keeping
  # critical operations in float32 for numerical stability.
  use_amp: true
  amp_dtype: "float16"     # "float16" for RTX 2070 SUPER, "bfloat16" for 30/40-series

  # --- Device ---
  device: "cuda"           # "cuda" for NVIDIA GPU, "cpu" for CPU-only
