# =============================================================================
# EXPERIMENT 4: 10 Training Seasons Ablation (Phase 1a)
# Date: Feb 14, 2026
# =============================================================================
# Changes from Exp 1 (full_baseline.yaml):
#   - train_seasons: 5 -> 10 seasons (2013-2023, ~12,800 games)
#   - Tests whether more training data improves generalization
#
# Result: Spread MAE 12.74, val_loss 37.57, best epoch 10, ~5.7M params
#
# Notes: More training data actually hurt test Spread MAE despite improving
#   val_loss. Older seasons (pre-2018) have different play styles and the
#   model learns patterns that don't generalize to 2024-2025. 5 seasons is
#   the sweet spot for this architecture.
# =============================================================================

data:
  train_seasons:
    - "2013-2014"
    - "2014-2015"
    - "2015-2016"
    - "2016-2017"
    - "2017-2018"
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true

model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.1

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0001
  weight_decay: 0.01
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0

training:
  max_epochs: 50
  patience: 15
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "ablation_10seasons"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.1
  gradient_accumulation_steps: 8
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
