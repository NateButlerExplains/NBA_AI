# =============================================================================
# Phase 3 Experiment 2: Fine-tuning Config
# Date: Mar 2, 2026
# =============================================================================
# Gradual unfreezing of pre-trained components from phase3_exp2_pretrain.yaml.
# Based on Exp 5a with pre-trained weight loading and discriminative LR.
#
# Unfreezing schedule:
#   Phase 0 (epochs 1-5):  Freeze 74 pre-trained params, train new heads only
#   Phase 1 (epochs 6-10): Unfreeze top temporal block (14 params)
#   Phase 2 (epochs 11+):  Unfreeze all with discriminative LR (0.9x/layer)
#
# Reference results:
#   Phase 2 Exp 5a:  Spread MAE 11.61, Win AUC 0.687
#
# ACTUAL RESULTS:
#   Val (EMA):  Spread MAE 11.61, Win AUC 0.678, Brier 0.2302, ECE 0.058
#   Test (EMA): Spread MAE 11.84, Win AUC 0.669, Win Acc 62.5%, Brier 0.2323
#   Best epoch 8 (during phase 1, top block unfrozen). Early stopped at 23.
#   Full unfreezing (epochs 11-23) did not improve.
#   Conclusion: No improvement. Pre-trained representations offer no advantage
#   over random initialization. Bottleneck is features/data, not encoder quality.
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/phase2_cache"
  n_recent_games: 5
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 15
  max_roster_size: 15
  batch_size: 4
  num_workers: 2
  pin_memory: true
  enable_augmentation: true

model:
  hidden_dim: 512
  player_embed_dim: 128
  n_players: 3000
  n_teams: 30
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2
  gs_embed_dim: 16
  gs_encoder_layers: 4
  gs_encoder_heads: 8
  gs_encoder_ff_dim: 2048
  gs_encoder_dropout: 0.1
  gs_max_seq_len: 1000
  temporal_layers: 3
  temporal_heads: 8
  temporal_ff_dim: 2048
  temporal_dropout: 0.1
  temporal_max_days: 180
  temporal_n_pool_queries: 4
  temporal_pos_encoding: "days_before"
  roster_layers: 2
  roster_heads: 8
  roster_ff_dim: 2048
  roster_dropout: 0.2
  rest_embed_dim: 64
  max_rest_days: 30
  fusion_dropout: 0.1
  prediction_hidden_dim: 256
  prediction_dropout: 0.3
  spread_min_std: 1.0
  score_min_std: 5.0
  enable_player_form: true
  player_form_dim: 64
  player_form_days_dim: 32
  player_form_heads: 4
  player_form_ff_dim: 256
  player_form_dropout: 0.2
  max_player_appearances: 40

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0001
  weight_decay: 0.1
  betas:
    - 0.9
    - 0.98
  eps: 0.00000001
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0

training:
  max_epochs: 100
  patience: 15
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001
  ema_decay: 0.999
  use_ema: true
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  consistency_loss_weight: 0.1
  nll_weight: 1.0
  mse_weight: 0.3
  gradient_accumulation_steps: 8
  checkpoint_dir: "checkpoints/phase3"
  save_every_n_epochs: 5
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  use_wandb: false
  wandb_project: "nba-phase3"
  experiment_name: "phase3_exp2_finetune"
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
  pretrained_checkpoint: "checkpoints/phase3/pretrain_exp2/transferable_weights.pt"
  freeze_pretrained_epochs: 5
  unfreeze_top_epochs: 5
  lr_decay_factor: 0.9
