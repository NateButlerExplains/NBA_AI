# =============================================================================
# EXPERIMENT 5: Shot Features — 2-Season Fast Test (Phase 1a)
# Date: Feb 17, 2026
# =============================================================================
# Uses 2 training seasons for ~15min epochs instead of ~30min.
# New features: shot_distance_bucket + shot_modifier tokens (#9 and #10).
# Token dim: 224 (up from 192), projected to 256.
#
# Result: Spread MAE 12.35, Avg Score MAE 10.09, Win Acc 52.0%, Win AUC 0.535,
#   val_loss 39.07, best epoch 13, ~5.85M params
#
# Notes: Avg Score MAE of 10.09 beats XGBoost baseline (10.1). Model trained
#   longer (best epoch 13 vs 5-9 in baselines), suggesting shot features give
#   more to learn. Spread MAE slightly worse due to less training data.
# =============================================================================

data:
  train_seasons:
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "fast_2season"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.1
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
