# =============================================================================
# EXPERIMENT 1 (Phase 3): Time-Aware Bidirectional GRU
# Date: Feb 27, 2026
# =============================================================================
# First Phase 3 experiment. Replaces the 3-layer temporal transformer with a
# bidirectional GRU that has native exponential-decay inductive bias.
#
# Hypothesis: The transformer temporal module must learn recency weighting
# from positional encoding alone. GRU gates naturally implement exponential
# decay — exactly the inductive bias for form/streaks. Additionally, the
# time-gap embedding lets the GRU distinguish "1 day between games" from
# "14 days" (All-Star break), modulating its gating accordingly.
#
# Architecture changes from Exp 5a:
#   1. temporal_type: "gru" (replaces 3-layer transformer)
#   2. Bidirectional GRU (256 per direction = 512 output)
#   3. days_before embedded as 64-d input feature to GRU
#   4. Same MultiQueryAttentionPool over GRU hidden states
#   5. temporal_n_pool_queries: 4 (Exp 5a used 8 — reduced since GRU outputs
#      are already contextualized, so fewer queries suffice)
#
# Everything else unchanged from Exp 5a for clean comparison.
# Net model ~36M params (vs ~39M Phase 2) due to GRU being lighter.
#
# Reference results:
#   Phase 2 Exp 5a:  Spread MAE 11.61, Win AUC 0.687
#
# ACTUAL RESULTS:
#   Val:  Spread MAE 11.34 (matched baseline)
#   Test: Spread MAE 11.72, Win AUC 0.677, Win Acc 61.9%, Brier 0.2286
#   Best epoch 9, early stopped at 24. 31M params.
#   Conclusion: No improvement. Temporal module is not the bottleneck.
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/phase2_cache"
  n_recent_games: 5
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 15
  max_roster_size: 15
  batch_size: 4
  num_workers: 2
  pin_memory: true
  enable_augmentation: true

model:
  hidden_dim: 512
  player_embed_dim: 128
  n_players: 4000
  n_teams: 30
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2
  gs_embed_dim: 16
  gs_encoder_layers: 4
  gs_encoder_heads: 8
  gs_encoder_ff_dim: 2048
  gs_encoder_dropout: 0.1
  gs_max_seq_len: 1000

  # GRU temporal module (NEW)
  temporal_type: "gru"
  temporal_gru_layers: 2
  temporal_gru_hidden: 256
  temporal_gru_dropout: 0.1
  temporal_gru_time_dim: 64
  temporal_max_days: 180
  temporal_n_pool_queries: 4
  temporal_heads: 8

  roster_layers: 2
  roster_heads: 8
  roster_ff_dim: 2048
  roster_dropout: 0.2
  rest_embed_dim: 64
  max_rest_days: 30
  fusion_dropout: 0.1
  prediction_hidden_dim: 256
  prediction_dropout: 0.3
  spread_min_std: 1.0
  score_min_std: 5.0

  # Player form encoder (from Exp 3/5a)
  enable_player_form: true
  player_form_dim: 64
  player_form_days_dim: 32
  player_form_heads: 4
  player_form_ff_dim: 256
  player_form_dropout: 0.2
  max_player_appearances: 40

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0001
  weight_decay: 0.1
  betas:
    - 0.9
    - 0.98
  eps: 0.00000001
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0

training:
  max_epochs: 100
  patience: 15
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001
  ema_decay: 0.999
  use_ema: true
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  consistency_loss_weight: 0.1
  nll_weight: 1.0
  mse_weight: 0.3
  gradient_accumulation_steps: 8
  checkpoint_dir: "checkpoints/phase3"
  save_every_n_epochs: 5
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  use_wandb: false
  wandb_project: "nba-phase3"
  experiment_name: "phase3_exp1_gru"
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
