# =============================================================================
# EXPERIMENT 5a (Phase 2): Fix Fusion Bottleneck + Revert Harmful Loss Changes
# Date: Feb 25, 2026
# =============================================================================
# ROOT CAUSE: Fusion MLP collapses 512-dim matchup representation to ~3
# effective dimensions (61% variance in top-1 singular value). The spread
# head has capacity to produce large values but gets no discriminative signal.
#
# CHANGES:
#   1. Fusion residual connection: output = interaction(combined) + diff
#      - Raw team-difference signal always reaches prediction heads
#      - MLP learns non-linear interactions on top (style clashes, etc.)
#      - Preserves long tail of signal (60 dims at 99% variance)
#
#   2. Remove fusion final LN/GELU/Dropout
#      - Was redundant with prediction heads' own LN/GELU/Dropout
#      - Clean residual: Linear output + raw diff, no normalization
#
#   3. Remove sigma cap (spread_max_std: null)
#      - Exp 4 cap at 8.0 was destructive: 75% of predictions pinned at cap,
#        coverage crashed 78% -> 64%. Model cannot express uncertainty.
#
#   4. MSE weight 0.1 -> 0.3 (insurance against sigma inflation trap)
#      - At 0.1 in Exp 3, sigma inflated to ~10.7, gradient on mu scaled
#        by 1/sigma^2 ≈ 0.009, killing mu learning.
#      - 0.3 gives 3x stronger direct gradient on mu without the 1.0
#        domination seen in Exp 4 (spread MSE was 223.5, overwhelming NLL).
#
# KEEPS from Exp 4:
#   - Gated dynamics merge, simpler rest embedding (architecture)
#   - Fusion dropout 0.1 (was 0.3, reduced for more signal preservation)
#   - All Exp 3 features (player form, team-relative scores, 8 pool queries)
#
# Reference results:
#   Exp 1 baseline:  Spread MAE 11.70, Win AUC 0.674, Coverage ~78%
#   Exp 3:           Spread MAE 11.67, Win AUC 0.682, Coverage 77.7%
#   Exp 4:           Spread MAE 11.69, Win AUC 0.673, Coverage 64.4%
#
# Expected: spread collapse should resolve (mean |pred| >> 3.68), coverage
# should recover to ~78%+. If fusion fix works, MAE and AUC should improve.
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/phase2_cache"
  n_recent_games: 5
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 15
  max_roster_size: 15
  batch_size: 4
  num_workers: 2
  pin_memory: true
  enable_augmentation: true

model:
  hidden_dim: 512
  player_embed_dim: 128
  n_players: 4000
  n_teams: 30
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2
  gs_embed_dim: 16
  gs_encoder_layers: 4
  gs_encoder_heads: 8
  gs_encoder_ff_dim: 2048
  gs_encoder_dropout: 0.1
  gs_max_seq_len: 1000
  temporal_layers: 3
  temporal_heads: 8
  temporal_ff_dim: 2048
  temporal_dropout: 0.1
  temporal_max_days: 180
  temporal_n_pool_queries: 8
  temporal_pos_encoding: "days_before"
  roster_layers: 2
  roster_heads: 8
  roster_ff_dim: 2048
  roster_dropout: 0.2
  rest_embed_dim: 64
  max_rest_days: 30
  fusion_dropout: 0.1            # Keep from Exp 4
  prediction_hidden_dim: 256
  prediction_dropout: 0.3
  spread_min_std: 1.0
  # spread_max_std: REMOVED — no sigma cap
  score_min_std: 5.0

  # Player form encoder (from Exp 3)
  enable_player_form: true
  player_form_dim: 64
  player_form_days_dim: 32
  player_form_heads: 4
  player_form_ff_dim: 256
  player_form_dropout: 0.2
  max_player_appearances: 40

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0001
  weight_decay: 0.1
  betas:
    - 0.9
    - 0.98
  eps: 0.00000001
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0

training:
  max_epochs: 100
  patience: 15
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001
  ema_decay: 0.999
  use_ema: true
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  consistency_loss_weight: 0.1
  nll_weight: 1.0
  mse_weight: 0.3               # Insurance against sigma trap (was 0.1)
  gradient_accumulation_steps: 8
  checkpoint_dir: "checkpoints/phase2"
  save_every_n_epochs: 5
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  use_wandb: false
  wandb_project: "nba-phase2"
  experiment_name: "phase2_exp5a_revert_loss"
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
