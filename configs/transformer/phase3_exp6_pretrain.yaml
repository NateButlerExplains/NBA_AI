# =============================================================================
# EXPERIMENT 6 — Pre-training Config: Per-Match Outcome Prediction
# Date: March 2026
# =============================================================================
# PURPOSE: Teach per_game_encoder "what a winning game looks like" by predicting
# win/loss + margin from player stats (score features masked).
#
# ~62K samples (31K games x 2 perspectives), all 15 training seasons.
# Loss: BCE(win) + 0.3 * MSE(margin).
# Output: transferable_weights.pt → player_embed + per_game_encoder weights.
# =============================================================================

data:
  train_seasons:
    - "2008-2009"
    - "2009-2010"
    - "2010-2011"
    - "2011-2012"
    - "2012-2013"
    - "2013-2014"
    - "2014-2015"
    - "2015-2016"
    - "2016-2017"
    - "2017-2018"
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/phase3_cache"
  n_recent_games: 5
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 15
  max_roster_size: 15
  batch_size: 32
  num_workers: 4
  pin_memory: true
  enable_augmentation: false
  n_player_stats: 16

model:
  hidden_dim: 512
  player_embed_dim: 128
  n_players: 3000
  n_teams: 30
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2
  n_player_stats: 16
  stat_hidden_dim: 64
  n_positions: 4
  position_dim: 8
  player_interaction_layers: 1
  player_interaction_heads: 4
  player_interaction_ff_dim: 1024
  player_interaction_dropout: 0.2

  # Unused by pre-training model but needed for config parsing
  gs_embed_dim: 16
  gs_encoder_layers: 4
  gs_encoder_heads: 8
  gs_encoder_ff_dim: 2048
  gs_encoder_dropout: 0.1
  gs_max_seq_len: 1000
  temporal_layers: 3
  temporal_heads: 8
  temporal_ff_dim: 2048
  temporal_dropout: 0.1
  temporal_max_days: 180
  temporal_n_pool_queries: 8
  temporal_pos_encoding: "days_before"
  roster_layers: 2
  roster_heads: 8
  roster_ff_dim: 2048
  roster_dropout: 0.2
  rest_embed_dim: 64
  max_rest_days: 30
  fusion_dropout: 0.1
  prediction_hidden_dim: 256
  prediction_dropout: 0.3
  spread_min_std: 1.0
  score_min_std: 5.0

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0003
  weight_decay: 0.05
  betas:
    - 0.9
    - 0.98
  eps: 0.00000001
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.05
  min_lr_ratio: 0.01
  max_grad_norm: 1.0

training:
  max_epochs: 30
  patience: 5
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001
  ema_decay: 0.999
  use_ema: false
  gradient_accumulation_steps: 2
  checkpoint_dir: "checkpoints/phase3"
  save_best_only: true
  log_every_n_steps: 50
  use_wandb: false
  experiment_name: "pretrain_exp6_outcome"
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
