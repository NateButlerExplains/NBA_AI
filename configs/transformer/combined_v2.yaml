# =============================================================================
# EXPERIMENT 14: Combined v2 — CrossAttentionFusion
# Date: Feb 20, 2026
# =============================================================================
# Same as Exp 13 but replaces SimpleFusion with CrossAttentionFusion. Home and
# away team representations explicitly cross-attend (home queries away, away
# queries home) with residual + LayerNorm, then concat + MLP to matchup repr.
# CrossAttentionFusion has ~263K params (vs ~200K for SimpleFusion).
#
# Result: Spread MAE 12.27, RMSE 15.57, Avg Score MAE 10.18, Win Acc 57.1%,
#   Win AUC 0.589, Brier 0.2495, ECE 0.0640, 90% Coverage 74.2%,
#   val_loss 38.14, best epoch 27, early stopped epoch 47, 6.20M params
#
# Notes: Cross-attention fusion did NOT outperform SimpleFusion. All test
#   metrics slightly worse than Exp 13 (Spread MAE 12.27 vs 12.20, Win AUC
#   0.589 vs 0.592). Trained deeper (best epoch 27 vs 17) suggesting more
#   complexity to converge but no final improvement. With only 2 input vectors
#   (one per team, each 256-d), cross-attention has limited benefit — the MLP
#   in SimpleFusion is sufficient.
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3
  # Phase 1b: Roster encoder
  use_roster: true
  roster_attention_heads: 4
  roster_attention_layers: 2
  # Phase 1c: Schedule embeddings
  n_schedule_features: 2
  # Combined Phase 1: Rest days + cross-attention fusion
  use_rest_days: true
  fusion_type: "cross_attention"
  cross_attention_heads: 4


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "combined_v2"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
