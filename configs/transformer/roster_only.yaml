# =============================================================================
# EXPERIMENT 15: Roster Only — No PBP history, just roster + rest days
# Date: Feb 20, 2026
# =============================================================================
# Ablation: tests whether PBP history adds signal beyond roster composition
# and rest days. Disables EventEncoder + TemporalAttention + schedule
# embeddings. Uses standalone player embedding (no shared PBP signal).
#
# vs Exp 13 (combined_v1): Removes PBP history + schedule embeddings entirely.
#   Only roster encoder (self-attention over player embeddings) + rest days.
#
# Result: Spread MAE 12.59, RMSE 16.00, Avg Score MAE 10.32, Win Acc 52.4%,
#   Win AUC 0.523, Brier 0.2575, ECE 0.0836, 90% Coverage 71.4%,
#   val_loss 38.80, best epoch 15, early stopped epoch 35, 911K params
#
# Notes: WORST WIN PREDICTION. Win AUC 0.523 vs 0.592 (Exp 13) — roster
#   alone cannot predict winners without game history context. However,
#   Spread MAE 12.59 is only 0.39 worse than Exp 13 (12.20), confirming
#   that PBP history adds minimal signal for point predictions. The
#   history stream's value is primarily in win probability, not spread.
#   Much smaller model (911K vs 6.07M params).
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3
  # DISABLED: No PBP history
  use_history: false
  # Phase 1b: Roster encoder (standalone player embedding, no shared PBP)
  use_roster: true
  roster_attention_heads: 4
  roster_attention_layers: 2
  # Phase 1c: No schedule embeddings (they attach to history games)
  n_schedule_features: 0
  # Rest days: direct target-game feature
  use_rest_days: true
  fusion_type: "simple"


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "roster_only"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
