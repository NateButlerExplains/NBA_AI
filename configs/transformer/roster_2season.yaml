# =============================================================================
# EXPERIMENT 11: Roster — 2 Seasons (Phase 1b)
# Date: Feb 20, 2026
# =============================================================================
# PBP + RosterEncoder. Adds target game's actual roster from
# GameStates.players_data. RosterEncoder: shared player_emb (64-d) ->
# 2-layer self-attention (4 heads) -> attention pooling -> Linear(64, 256).
# 4 streams concatenated into SimpleFusion (1024-d input).
# +400K params (6.1M total): roster encoder ~134K + expanded fusion ~200K.
#
# Result: Spread MAE 12.48, Avg Score MAE 10.19, Win Acc 53.7%, Win AUC 0.551,
#   val_loss 38.05, best epoch 23, early stopped epoch 43, ~6.1M params
#
# Notes: Val loss improved substantially (38.05 vs 39.07 Exp 5) and model
#   trained much longer (best epoch 23 vs 13), but spread MAE on test is
#   worse (12.48 vs 12.35). Win accuracy and AUC improved. The model is
#   learning from rosters but the signal isn't translating to better spread
#   prediction with limited data.
# =============================================================================

data:
  train_seasons:
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3
  # Phase 1b: Roster encoder
  use_roster: true
  roster_attention_heads: 4
  roster_attention_layers: 2


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "roster_2season"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.1
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
