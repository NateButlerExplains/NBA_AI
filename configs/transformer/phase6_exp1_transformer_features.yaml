# =============================================================================
# PHASE 6 EXPERIMENT 1: Transformer + Auxiliary Matchup Features
# Date: March 2026
# =============================================================================
# PURPOSE: Add matchup-level engineered + betting features to the Phase 3
# Exp 4 transformer. Tests whether explicit summary statistics (win%, form,
# rest, Vegas lines) improve spread/ATS prediction beyond what the temporal
# attention learns implicitly from raw game-by-game data.
#
# ARCHITECTURE CHANGE:
#   After fusion produces matchup_repr (B, 512), add:
#     aux_encoder: Linear(12, 64) → LN → GELU → Linear(64, 512)
#   Output added as residual to matchup_repr before prediction heads.
#   ~33K new params (<0.1% of total).
#
# FEATURES (12):
#   Engineered (all games): win% (20g), form (5g), home/away splits,
#     season progress, rest differential
#   Betting (2008+ via ESPN current, 2021+ via covers/ESPN closing):
#     Vegas spread, total, ML implied prob, has_betting indicator
#
# BASELINE: Exp 4 — MAE 10.83, AUC 0.705, Win Acc 65.1%, ATS 58.7%
#
# NOTE: Exp 1a (warm-start) was not run to completion. Exp 1b (from-scratch)
# was used instead. See phase6_exp1b_from_scratch.yaml for results.
#
# WARM-START: From Exp 4 best checkpoint (258/259 params loaded).
# aux_encoder output is zero-initialized so model starts at Exp 4 performance.
# 3-phase freeze schedule:
#   Phase 0 (epochs 1-8):  Only aux_encoder + prediction_heads + fusion train
#   Phase 1 (epochs 9-12): + top temporal block
#   Phase 2 (epochs 13+):  All unfrozen with 0.85x/layer discriminative LR
# Base LR halved to 5e-5 for fine-tuning stability.
# =============================================================================

data:
  train_seasons:
    - "2008-2009"
    - "2009-2010"
    - "2010-2011"
    - "2011-2012"
    - "2012-2013"
    - "2013-2014"
    - "2014-2015"
    - "2015-2016"
    - "2016-2017"
    - "2017-2018"
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/phase3_cache"
  n_recent_games: 5
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 15
  max_roster_size: 15
  batch_size: 12
  num_workers: 2
  pin_memory: true
  enable_augmentation: true
  n_player_stats: 16
  aux_features_file: "data/phase6_exp1_aux/aux_features.json"

model:
  hidden_dim: 512
  player_embed_dim: 128
  n_players: 3000
  n_teams: 30
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2

  # Player stats (Phase 3)
  n_player_stats: 16
  stat_hidden_dim: 64
  n_positions: 4
  position_dim: 8

  # Player interaction (Exp 4)
  player_interaction_layers: 1
  player_interaction_heads: 4
  player_interaction_ff_dim: 1024
  player_interaction_dropout: 0.2

  # Auxiliary matchup features (Phase 6 Exp 1)
  n_aux_features: 12
  aux_hidden_dim: 64

  gs_embed_dim: 16
  gs_encoder_layers: 4
  gs_encoder_heads: 8
  gs_encoder_ff_dim: 2048
  gs_encoder_dropout: 0.1
  gs_max_seq_len: 1000
  temporal_layers: 3
  temporal_heads: 8
  temporal_ff_dim: 2048
  temporal_dropout: 0.1
  temporal_max_days: 180
  temporal_n_pool_queries: 8
  temporal_pos_encoding: "days_before"
  roster_layers: 2
  roster_heads: 8
  roster_ff_dim: 2048
  roster_dropout: 0.2
  rest_embed_dim: 64
  max_rest_days: 30
  fusion_dropout: 0.1
  prediction_hidden_dim: 256
  prediction_dropout: 0.3
  spread_min_std: 1.0
  score_min_std: 5.0

  # Player form encoder
  enable_player_form: true
  player_form_dim: 128
  player_form_days_dim: 32
  player_form_heads: 4
  player_form_ff_dim: 512
  player_form_dropout: 0.2
  max_player_appearances: 40

optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005          # 5e-5: half of from-scratch LR for fine-tuning
  weight_decay: 0.1
  betas:
    - 0.9
    - 0.98
  eps: 0.00000001
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1              # 10% warmup: gentler ramp-up for fine-tuning
  min_lr_ratio: 0.1
  max_grad_norm: 1.0

training:
  max_epochs: 60
  patience: 15                    # More patience: 3 phase transitions cause temporary regressions
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001
  ema_decay: 0.999
  use_ema: true
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  consistency_loss_weight: 0.1
  nll_weight: 1.0
  mse_weight: 0.3
  gradient_accumulation_steps: 3
  checkpoint_dir: "checkpoints/phase6"
  save_every_n_epochs: 5
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  use_wandb: false
  wandb_project: "nba-phase6"
  experiment_name: "phase6_exp1a_warmstart"
  pretrained_checkpoint: "checkpoints/phase3/phase3_exp4_interaction/best.pt"
  freeze_pretrained_epochs: 8     # Phase 0: only aux_encoder + prediction_heads + fusion train
  unfreeze_top_epochs: 4          # Phase 1: + top temporal block (epochs 8-11)
  lr_decay_factor: 0.85           # Phase 2: discriminative LR, 0.85x per layer depth
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
