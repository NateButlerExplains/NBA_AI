# =============================================================================
# EXPERIMENT 13: Combined v1 — All Phase 1 Features + SimpleFusion
# Date: Feb 20, 2026
# =============================================================================
# All Phase 1 features combined: PBP + RosterEncoder + Schedule embeddings +
# Rest days. New architecture: per-team combine (element-wise add of
# history + roster + rest_days -> LayerNorm) then SimpleFusion on 2 team
# representations (not 4 streams). rest_days: Embedding(30, 32) ->
# Linear(32, 256) -> LayerNorm, derived from days_before_target[0] - 1.
#
# vs Exp 12: Added rest_days, schedule, per-team combine, win_prob 0.1->0.3,
#   SimpleFusion now receives 2 streams (512-d) instead of 4 (1024-d).
#
# Result: Spread MAE 12.20, RMSE 15.54, Avg Score MAE 10.18, Win Acc 57.6%,
#   Win AUC 0.592, Brier 0.2471, ECE 0.0477, 90% Coverage 72.9%,
#   val_loss 37.74, best epoch 17, early stopped epoch 37, 6.07M params
#
# Notes: BEST OVERALL MODEL. Best Win AUC (0.592) and Win Accuracy (57.6%)
#   across all experiments. Ties Exp 1's best Spread MAE (12.20) while having
#   much better win prediction. vs Exp 12: Win AUC 0.592 vs 0.583, Win Acc
#   57.6% vs 56.9%, Spread MAE 12.20 vs 12.33. The combination of rest_days +
#   schedule + higher win_prob weight works — better at predicting both who
#   wins and by how much.
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3
  # Phase 1b: Roster encoder
  use_roster: true
  roster_attention_heads: 4
  roster_attention_layers: 2
  # Phase 1c: Schedule embeddings
  n_schedule_features: 2
  # Combined Phase 1: Rest days + fusion
  use_rest_days: true
  fusion_type: "simple"


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "combined_v1"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
