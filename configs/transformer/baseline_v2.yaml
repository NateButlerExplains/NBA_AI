# =============================================================================
# EXPERIMENT 2: Baseline v2 — Tuned Regularization (Phase 1a)
# Date: Feb 14, 2026
# =============================================================================
# Changes from Exp 1 (full_baseline.yaml):
#   - dropout: 0.1 -> 0.3 (stronger regularization against overfitting)
#   - weight_decay: 0.01 -> 0.05 (heavier L2 penalty)
#   - learning_rate: 1e-4 -> 5e-5 (slower learning = more useful epochs)
#   - gradient_accumulation_steps: 8 -> 16 (effective batch 64, smoother gradients)
#   - patience: 15 -> 20 (give more time to converge with lower LR)
#
# Result: Spread MAE 12.26, val_loss 38.49, best epoch 9, ~5.7M params
#
# Notes: Regularization extended useful training (5->9 epochs) and slightly
#   improved val_loss, but Spread MAE was marginally worse (12.26 vs 12.20).
#   The model trains longer without overfitting as quickly. These tuned
#   settings (dropout=0.3, LR=5e-5, grad_accum=16) became the standard
#   for all subsequent experiments.
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3              # was 0.1


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005     # was 0.0001
  weight_decay: 0.05         # was 0.01
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20               # was 15
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "baseline_v2"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.1
  gradient_accumulation_steps: 16   # was 8 (effective batch 64)
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
