# =============================================================================
# EXPERIMENT 12: Roster — 5 Seasons (Phase 1b)
# Date: Feb 20, 2026
# =============================================================================
# Same roster model as Exp 11 with full 5-season training data.
#
# Result: Spread MAE 12.33, Avg Score MAE 10.12, Win Acc 56.9%, Win AUC 0.583,
#   val_loss 37.25, best epoch 31, ran all 50 epochs, ~6.1M params
#
# Notes: Best val_loss across all Phase 1a-c experiments (37.25). Best Win AUC
#   (0.583) and Win Accuracy (56.9%). Trained remarkably deep (best epoch 31
#   vs typical 5-12). The model extracts genuine signal from roster
#   composition. However, Spread MAE (12.33) still doesn't break the ~12.2
#   ceiling. KEY FINDING: Roster helps predict WHO wins but not BY HOW MUCH.
# =============================================================================

data:
  train_seasons:
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"

  val_seasons:
    - "2023-2024"

  test_seasons:
    - "2024-2025"
    - "2025-2026"

  n_history_games: 5
  min_history_games: 3
  tokenizer_path: "data/tokenized/tokenizer.json"
  min_token_count: 5
  batch_size: 4
  num_workers: 2
  cache_size: 2000
  pin_memory: true


model:
  hidden_dim: 256
  max_pbp_length: 1000
  max_history_games: 10
  event_encoder_layers: 4
  event_encoder_heads: 8
  temporal_attention_layers: 2
  temporal_attention_heads: 4
  temporal_positional_encoding: "learned"
  temporal_pooling: "attention"
  dropout: 0.3
  # Phase 1b: Roster encoder
  use_roster: true
  roster_attention_heads: 4
  roster_attention_layers: 2


optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.05
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.1
  min_lr_ratio: 0.1
  max_grad_norm: 1.0


training:
  max_epochs: 50
  patience: 20
  min_delta: 0.0001
  checkpoint_dir: "checkpoints/transformer"
  experiment_name: "roster_5season"
  save_every_n_epochs: 5
  keep_n_checkpoints: 3
  log_every_n_steps: 200
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.1
  gradient_accumulation_steps: 16
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
