# =============================================================================
# EXPERIMENT 5b (Phase 3): Slim Roster-Temporal with Sigma Capping
# Date: March 2026
# =============================================================================
# PURPOSE: Slimmed-down Exp 5 — fewer layers/heads in GS encoder, temporal
# attention, and roster encoder. Adds spread_max_std to cap sigma inflation
# (Exp 5a sharpness was 33.03, coverage 80.8%).
#
# Changes from Exp 5:
#   - gs_encoder:  4L/8H/2048FF  -> 2L/4H/1024FF  (256-d kept via hidden_dim)
#   - temporal:    3L/8H/2048FF  -> 2L/4H/1024FF
#   - roster:      2L            -> 1L
#   - spread_max_std: 8.0        (was uncapped)
#   - learning_rate: 5e-5        (was 1e-4)
#   - patience: 20               (was 10)
#
# BASELINE: Exp 5 — MAE 10.61, AUC 0.693, Win Acc 63.7%, ECE 0.0354
# =============================================================================

data:
  train_seasons:
    - "2008-2009"
    - "2009-2010"
    - "2010-2011"
    - "2011-2012"
    - "2012-2013"
    - "2013-2014"
    - "2014-2015"
    - "2015-2016"
    - "2016-2017"
    - "2017-2018"
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/phase3_cache"
  n_recent_games: 5
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 15
  max_roster_size: 15
  batch_size: 4
  num_workers: 2
  pin_memory: true
  enable_augmentation: true
  n_player_stats: 16

model:
  hidden_dim: 512
  player_embed_dim: 128
  n_players: 3000
  n_teams: 30
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2

  # Player stats (Phase 3)
  n_player_stats: 16
  stat_hidden_dim: 64
  n_positions: 4
  position_dim: 8

  # Player interaction (Exp 4)
  player_interaction_layers: 1
  player_interaction_heads: 4
  player_interaction_ff_dim: 1024
  player_interaction_dropout: 0.2

  # Roster-conditioned temporal (Exp 5)
  enable_roster_context: true
  roster_context_heads: 8
  roster_context_dropout: 0.1

  # GS encoder — slimmed: 2L/4H/1024FF (was 4L/8H/2048FF)
  gs_embed_dim: 16
  gs_encoder_layers: 2
  gs_encoder_heads: 4
  gs_encoder_ff_dim: 1024
  gs_encoder_dropout: 0.1
  gs_max_seq_len: 1000

  # Temporal attention — slimmed: 2L/4H/1024FF (was 3L/8H/2048FF)
  temporal_layers: 2
  temporal_heads: 4
  temporal_ff_dim: 1024
  temporal_dropout: 0.1
  temporal_max_days: 180
  temporal_n_pool_queries: 8
  temporal_pos_encoding: "days_before"

  # Roster encoder — slimmed: 1L (was 2L)
  roster_layers: 1
  roster_heads: 8
  roster_ff_dim: 2048
  roster_dropout: 0.2

  rest_embed_dim: 64
  max_rest_days: 30
  fusion_dropout: 0.1
  prediction_hidden_dim: 256
  prediction_dropout: 0.3
  spread_min_std: 1.0
  spread_max_std: 8.0
  score_min_std: 5.0

  # Player form encoder
  enable_player_form: true
  player_form_dim: 128
  player_form_days_dim: 32
  player_form_heads: 4
  player_form_ff_dim: 512
  player_form_dropout: 0.2
  max_player_appearances: 40

optimizer:
  optimizer: "adamw"
  learning_rate: 0.00005
  weight_decay: 0.1
  betas:
    - 0.9
    - 0.98
  eps: 0.00000001
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0

training:
  max_epochs: 100
  patience: 20
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001
  ema_decay: 0.999
  use_ema: true
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  consistency_loss_weight: 0.1
  nll_weight: 1.0
  mse_weight: 0.3
  gradient_accumulation_steps: 8
  checkpoint_dir: "checkpoints/phase3"
  save_every_n_epochs: 5
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  use_wandb: false
  wandb_project: "nba-phase3"
  experiment_name: "phase3_exp5b_slim"
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
