# =============================================================================
# Phase 3 Experiment 2: Pre-training Config
# Date: Mar 1, 2026
# =============================================================================
# BERT-style masked reconstruction on all available seasons (2001-2026).
# 40% of game positions masked with learned [MASK] token.
# Predict team_score, opp_score, margin at masked positions (MSE loss).
# Pre-trains: player_embed, per_game_encoder, temporal_attention.
# Saves transferable_weights.pt for fine-tuning (phase3_exp2_finetune.yaml).
#
# Data: 687 train team-season samples, 60 val samples from 25 seasons.
# Each sample = one team's full season (~82 games).
#
# ACTUAL RESULTS:
#   Converged in 11 epochs (~23 seconds total)
#   Best val reconstruction MSE: 1.163304
#   Dataset too small for deep pre-training (687 samples at batch_size=16 = 43 batches/epoch)
# =============================================================================

data:
  train_seasons:
    - "2001-2002"
    - "2002-2003"
    - "2003-2004"
    - "2004-2005"
    - "2005-2006"
    - "2006-2007"
    - "2007-2008"
    - "2008-2009"
    - "2009-2010"
    - "2010-2011"
    - "2011-2012"
    - "2012-2013"
    - "2013-2014"
    - "2014-2015"
    - "2015-2016"
    - "2016-2017"
    - "2017-2018"
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
    - "2023-2024"
  val_seasons:
    - "2024-2025"
  test_seasons: []
  cache_dir: "data/pretrain_cache"
  max_context_games: 82
  max_players_per_game: 15
  batch_size: 16
  num_workers: 2
  pin_memory: true
  enable_augmentation: false
  mask_ratio: 0.4
  # These are not used by PretrainDataset but included for config compatibility
  n_recent_games: 5
  min_history_games: 3
  max_roster_size: 15

model:
  hidden_dim: 512
  player_embed_dim: 128
  n_players: 3000
  n_teams: 30
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2
  temporal_layers: 3
  temporal_heads: 8
  temporal_ff_dim: 2048
  temporal_dropout: 0.1
  temporal_max_days: 180
  temporal_n_pool_queries: 4
  temporal_pos_encoding: "days_before"
  # GameStates encoder settings (not used in pre-training but needed for config)
  gs_embed_dim: 16
  gs_encoder_layers: 4
  gs_encoder_heads: 8
  gs_encoder_ff_dim: 2048
  gs_encoder_dropout: 0.1
  gs_max_seq_len: 1000
  # Roster (not used in pre-training)
  roster_layers: 2
  roster_heads: 8
  roster_ff_dim: 2048
  roster_dropout: 0.2
  rest_embed_dim: 64
  max_rest_days: 30
  fusion_dropout: 0.1
  prediction_hidden_dim: 256
  prediction_dropout: 0.3
  spread_min_std: 1.0
  score_min_std: 5.0

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0003
  weight_decay: 0.05
  betas:
    - 0.9
    - 0.98
  eps: 0.00000001
  scheduler: "cosine"
  warmup_steps: 0
  warmup_ratio: 0.05
  min_lr_ratio: 0.1
  max_grad_norm: 1.0

training:
  max_epochs: 50
  patience: 10
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001
  ema_decay: 0.999
  use_ema: true
  # Loss weights not used in pre-training but needed for config compatibility
  spread_loss_weight: 1.0
  score_loss_weight: 0.5
  win_prob_loss_weight: 0.3
  consistency_loss_weight: 0.1
  nll_weight: 1.0
  mse_weight: 0.1
  gradient_accumulation_steps: 2
  checkpoint_dir: "checkpoints/phase3"
  save_every_n_epochs: 5
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  use_wandb: false
  wandb_project: "nba-phase3"
  experiment_name: "pretrain_exp2"
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  device: "cuda"
