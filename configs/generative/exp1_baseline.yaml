data:
  train_seasons:
    - "2008-2009"
    - "2009-2010"
    - "2010-2011"
    - "2011-2012"
    - "2012-2013"
    - "2013-2014"
    - "2014-2015"
    - "2015-2016"
    - "2016-2017"
    - "2017-2018"
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/generative_cache"
  db_path: "data/NBA_AI_full.sqlite"
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 13
  max_seq_len: 700
  n_player_stats: 16
  batch_size: 4
  num_workers: 2
  pin_memory: true
  score_jitter_std: 0.5

model:
  hidden_dim: 512
  dropout: 0.1
  n_players: 5000
  player_embed_dim: 128
  player_stat_dim: 64
  player_hidden_dim: 256
  player_pool_heads: 4
  score_input_dim: 4
  score_dim: 128
  opponent_dim: 64
  location_dim: 32
  n_teams: 30
  temporal_layers: 3
  temporal_heads: 8
  temporal_ff_dim: 2048
  temporal_dropout: 0.1
  temporal_max_days: 180
  temporal_n_pool_queries: 4
  max_rest_days: 30
  rest_dim: 64
  state_input_dim: 7
  state_hidden_dim: 256
  decoder_layers: 6
  decoder_heads: 8
  decoder_ff_dim: 2048
  decoder_dropout: 0.1
  decoder_max_seq_len: 800
  n_score_classes: 7
  head_hidden_dim: 128
  context_dropout: 0.1
  score_class_weights:
    - 1.0    # no_score
    - 4.0    # home+1
    - 4.5    # home+2
    - 5.0    # home+3
    - 4.0    # away+1
    - 4.5    # away+2
    - 5.0    # away+3

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0003
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 0.00000001
  scheduler: "cosine"
  warmup_ratio: 0.05
  min_lr_ratio: 0.01
  max_grad_norm: 1.0

training:
  max_epochs: 50
  patience: 10
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  score_loss_weight: 1.0
  clock_loss_weight: 0.3
  context_loss_weight: 1.0
  gradient_accumulation_steps: 8
  checkpoint_dir: "checkpoints/generative"
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  experiment_name: "gen_exp1_baseline"
  seed: 42
  use_amp: true
  amp_dtype: "float16"
  use_ema: true
  ema_decay: 0.999
  device: "cuda"
  n_rollouts: 100
  rollout_temperature: 1.0
  max_rollout_steps: 700
