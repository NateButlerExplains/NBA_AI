data:
  train_seasons:
    - "2008-2009"
    - "2009-2010"
    - "2010-2011"
    - "2011-2012"
    - "2012-2013"
    - "2013-2014"
    - "2014-2015"
    - "2015-2016"
    - "2016-2017"
    - "2017-2018"
    - "2018-2019"
    - "2019-2020"
    - "2020-2021"
    - "2021-2022"
    - "2022-2023"
  val_seasons:
    - "2023-2024"
  test_seasons:
    - "2024-2025"
    - "2025-2026"
  cache_dir: "data/exp5_cache"
  db_path: "data/NBA_AI_full.sqlite"
  max_context_games: 82
  min_history_games: 3
  max_players_per_game: 13
  max_seq_len: 700
  n_player_stats: 16
  batch_size: 4
  num_workers: 2
  pin_memory: true
  score_jitter_std: 0.5

model:
  hidden_dim: 512
  dropout: 0.1
  n_teams: 30

  # Full context encoder (Exp 5)
  use_full_context: true
  full_context_temporal_layers: 2
  full_context_temporal_heads: 4
  full_context_temporal_ff_dim: 1024
  full_context_temporal_pool_queries: 2
  full_context_player_dropout: 0.3
  full_context_temporal_dropout: 0.2
  n_positions: 5
  position_dim: 8
  player_interaction_layers: 1
  player_interaction_heads: 4
  player_interaction_ff_dim: 1024
  player_interaction_dropout: 0.2
  rolling_stats_proj_dim: 128
  n_rolling_features: 28
  player_contribution_dim: 256
  player_contribution_heads: 4
  player_contribution_dropout: 0.2
  player_contribution_n_pool_queries: 1
  stat_hidden_dim: 64
  context_feature_dropout: 0.1

  # Scoring-event compression (from Exp 4)
  use_scoring_events_only: true
  max_scoring_events: 200

  # 6 classes: h+1, h+2, h+3, a+1, a+2, a+3 (game_end removed — rules engine)
  n_score_classes: 6
  head_hidden_dim: 128

  # Enriched state vector: 18-dim (8 base + 6 player-scoring + 4 dynamics)
  state_input_dim: 18
  state_hidden_dim: 256

  # Decoder
  decoder_layers: 6
  decoder_heads: 8
  decoder_ff_dim: 2048
  decoder_dropout: 0.1
  decoder_max_seq_len: 250

  # Context dropout 15% for CFG training
  context_dropout: 0.15

  # Uniform class weights — let the model learn
  score_class_weights:
    - 1.0  # home+1
    - 1.0  # home+2
    - 1.0  # home+3
    - 1.0  # away+1
    - 1.0  # away+2
    - 1.0  # away+3

  # Outcome head
  outcome_min_std: 1.0
  outcome_max_std: 20.0

  # Clock-delta: predict positive increment instead of absolute progress
  use_clock_delta: true
  clock_delta_min: 0.001

optimizer:
  optimizer: "adamw"
  learning_rate: 0.0001
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 0.00000001
  scheduler: "cosine"
  warmup_ratio: 0.05
  min_lr_ratio: 0.01
  max_grad_norm: 1.0

training:
  max_epochs: 50
  patience: 15
  early_stopping_metric: "val_spread_mae"
  smoothing_window: 3
  min_delta: 0.0001

  # Loss weights
  score_loss_weight: 1.0
  clock_loss_weight: 0.3
  context_loss_weight: 1.0
  pre_margin_weight: 0.5
  pre_win_weight: 0.3
  outcome_loss_weight: 0.2

  # Context encoder regularization
  context_encoder_lr_scale: 0.33
  context_encoder_weight_decay: 0.05
  context_feature_dropout: 0.1

  # Training settings
  gradient_accumulation_steps: 8
  checkpoint_dir: "checkpoints/generative"
  save_best_only: true
  keep_n_checkpoints: 3
  log_every_n_steps: 50
  experiment_name: "gen_exp5b_clock_delta"
  seed: 42
  use_amp: false
  amp_dtype: "float16"
  use_ema: true
  ema_decay: 0.999
  device: "cuda"

  # No scheduled sampling
  use_scheduled_sampling: false

  # Inference
  n_rollouts: 100
  rollout_temperature: 1.0
  max_rollout_steps: 200
  guidance_scale: 1.5
